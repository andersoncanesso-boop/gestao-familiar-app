<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Familiar Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gestão Familiar">
    <link rel="apple-touch-icon" href="https://i.imgur.com/8v9htgN.png?v=2">
    <link rel="icon" type="image/png" href="https://i.imgur.com/8v9htgN.png?v=2">
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'Gestão Familiar','short_name':'Gestão','start_url':'.','display':'standalone','background_color':'#1e1b4b','theme_color':'#1e1b4b','icons':[{'src':'https://i.imgur.com/8v9htgN.png?v=2','sizes':'512x512','type':'image/png','purpose':'any maskable'}]}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --accent: #a855f7;
            --bg: #f3f4f6;
            --card-bg: #ffffff;
            --header-bg: #1e1b4b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #22c55e;
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding-bottom: 50px; 
            line-height: 1.5;
        }
        
        /* HEADER E NAVEGAÇÃO */
        header {
            background: var(--header-bg);
            color: white;
            padding: 15px 20px;
            display: flex; 
            flex-direction: column;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: var(--shadow);
        }

        @media (min-width: 430px) {
            header { flex-direction: row; justify-content: space-between; }
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img { 
            width: 60px; 
            height: 60px; 
            border-radius: 15px; 
            object-fit: cover; 
            background: white; 
            border: 2px solid rgba(255,255,255,0.2); 
        }
        .logo-text { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; }
        
        .nav-right { display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center; }
        @media (min-width: 430px) { .nav-right { width: auto; } }

        .nav-pills { 
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px;
            border-radius: 15px;
            gap: 5px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            border: none;
            background: none;
            color: white;
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.65rem;
            transition: all 0.3s ease;
            opacity: 0.6;
            text-transform: uppercase;
        }

        .nav-btn.active { 
            background: var(--primary); 
            opacity: 1; 
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* FORMULÁRIO E CARDS */
        .container { width: 94%; max-width: 500px; margin: 20px auto; }
        .hidden { display: none !important; }

        .form-card { 
            background: white; 
            padding: 25px; 
            border-radius: 30px; 
            margin-bottom: 30px; 
            box-shadow: var(--shadow);
        }

        input, select, button#btnSalvar { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 15px; 
            border: 1px solid #e5e7eb; 
            box-sizing: border-box; 
            font-size: 1rem; 
            transition: border-color 0.2s;
        }

        input:focus, select:focus { border-color: var(--primary); }

        button#btnSalvar { 
            background: var(--primary); 
            color: white; 
            border: none; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 10px;
            box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.5);
        }

        /* BOTÃO DE AVISO DE MERCADORIA */
        #avisoMercadoria {
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            margin-top: -10px;
            margin-bottom: 20px;
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        /* CARDS DE TAREFA */
        .tarefa-card {
            background: white;
            border-radius: 25px;
            padding: 18px;
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            border-left: 8px solid transparent;
            transition: transform 0.2s;
        }

        .check-area {
            width: 32px;
            height: 32px;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .check-area.done { background: var(--success); border-color: var(--success); color: white; }
        
        .info-area { flex: 1; }
        .cat-badge { font-size: 0.65rem; font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        .task-name { font-size: 1.05rem; font-weight: 700; color: #111827; }
        .task-meta { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; display: block; }
        .task-cost { font-weight: 900; color: #059669; font-size: 0.95rem; }

        /* PAINEL ADMIN E FATURAS */
        .fatura-header {
            background: linear-gradient(135deg, #4338ca, #6366f1);
            color: white; padding: 30px; border-radius: 30px; margin-bottom: 25px; text-align: center;
            box-shadow: var(--shadow);
        }
        .fatura-valor { font-size: 2.2rem; font-weight: 900; margin-top: 5px; }

        .admin-panel { background: white; padding: 25px; border-radius: 30px; box-shadow: var(--shadow); }
        .chart-container { 
            background: #f9fafb; 
            padding: 15px; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            border: 1px solid #f3f4f6;
            height: 280px;
        }

        /* MERCADORIAS */
        .lista-header { 
            font-size: 0.75rem; 
            font-weight: 900; 
            color: var(--text-muted); 
            margin: 25px 0 12px 10px; 
            text-transform: uppercase; 
            border-left: 5px solid var(--primary); 
            padding-left: 12px; 
        }
        .item-card { 
            background: white; 
            padding: 18px; 
            border-radius: 20px; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); 
        }

        @media print {
            header, .nav-pills, .form-card, #avisoMercadoria, .action-btns { display: none !important; }
        }
    </style>
</head>
<body>

<header id="appHeader" class="hidden">
    <div class="logo-area">
        <img class="logo-img" src="https://i.imgur.com/8v9htgN.png" alt="Logo">
        <div class="logo-text">Gestão Familiar</div>
    </div>
    <div class="nav-right">
        <nav class="nav-pills">
            <button class="nav-btn active" id="btnPlan" onclick="mudarAba('planejamento')">Planejamento</button>
            <button class="nav-btn" id="btnT" onclick="mudarAba('tarefas')">Tarefas</button>
            <button class="nav-btn" id="btnC" onclick="mudarAba('cronograma')">Despesas</button>
            <button class="nav-btn" id="btnF" onclick="mudarAba('faturas')">Faturas</button>
            <button class="nav-btn" id="btnI" onclick="mudarAba('itens')">Mercadorias</button>
            <button class="nav-btn" id="btnH" onclick="mudarAba('historico')">Histórico</button>
            <button class="nav-btn" id="btnA" onclick="mudarAba('admin')">Admin</button>
        </nav>
        <button class="btn-logoff" onclick="fazerLogoff()" style="border:none; background:none; color:white; cursor:pointer;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
    </div>
</header>

<div class="container">
    <div id="telaLogin" style="text-align:center; padding-top: 150px;">
        <h1 style="color: var(--header-bg); font-size: 2.5rem; margin-bottom: 10px;">Gestão Familiar</h1>
        <p style="color: var(--text-muted); margin-bottom: 40px;">Controle financeiro e organização em um só lugar.</p>
        <button id="btnLogin" style="background:var(--primary); color:white; padding:22px; border-radius:20px; width:100%; border:none; font-weight:800; font-size: 1.2rem; cursor:pointer; box-shadow: 0 12px 24px -8px rgba(99, 102, 241, 0.5);">Entrar com Google</button>
    </div>

    <div id="telaApp" class="hidden">
        <div id="areaForm">
            <div class="form-card">
                <input type="text" id="inputTarefa" placeholder="O que deseja registrar?">
                <input type="text" id="inputSubItens" placeholder="Itens para lista (separe por vírgula)">
                
                <div style="display:flex; gap:12px;">
                    <select id="selectCategoria" style="flex:1.6;">
                        <option value="GERAL">📂 GERAL</option>
                        <option value="ALIMENTAÇÃO">🧑‍🍳 ALIMENTAÇÃO</option>
                        <option value="MERCADO">🛒 MERCADO</option>
                        <option value="CARTÃO">💳 CARTÃO DE CRÉDITO</option>
                        <option value="CARRO">🚗 CARRO</option>
                        <option value="IGREJA">⛪ IGREJA/PASCOM</option>
                        <option value="EDUCAÇÃO">📚 EDUCAÇÃO</option>
                        <option value="FAXINA">🧹 FAXINA</option>
                        <option value="PET">🐾 PET</option>
                        <option value="SAÚDE">💊 SAÚDE</option>
                        <option value="CONTAS">💰 CONTAS</option>
                        <option value="LAZER">🎈 LAZER</option>
                    </select>
                    <select id="selectRecorrencia" style="flex:1;">
                        <option value="NENHUMA">🔄 Única</option>
                        <option value="DIÁRIA">📅 Diária</option>
                        <option value="SEMANAL">📅 Semanal</option>
                        <option value="MENSAL">📅 Mensal</option>
                    </select>
                </div>

                <div style="display:flex; gap:12px;">
                    <input type="text" id="inputCusto" placeholder="VALOR R$" style="flex:1.6;" oninput="mascaraDinheiro(this)">
                    <input type="number" id="inputParcelas" placeholder="Parc." style="flex:1;">
                </div>

                <div style="display:flex; gap:12px;">
                    <input type="date" id="inputData" style="flex:1.6;">
                    <input type="time" id="inputHora" style="flex:1;">
                </div>

                <button id="btnSalvar">Salvar no Sistema</button>
                <button id="avisoMercadoria" class="hidden" onclick="mudarAba('itens')">🛒 Itens ativos! Ver Mercadorias</button>
            </div>
        </div>

        <div id="areaFaturas" class="hidden">
            <div class="fatura-header">
                <span style="text-transform: uppercase; font-size: 0.9rem; font-weight: 800; opacity: 0.8;">Total da Fatura</span>
                <div class="fatura-valor" id="valorTotalFatura">R$ 0,00</div>
            </div>
            <div class="filter-section">
                <div style="display:flex; gap:12px;">
                    <select id="filtroMesFatura" style="padding:12px; border-radius:12px; border:1px solid #ddd; flex:1;" onchange="renderizar()"></select>
                    <select id="filtroAnoFatura" style="padding:12px; border-radius:12px; border:1px solid #ddd; flex:1;" onchange="renderizar()"></select>
                </div>
            </div>
        </div>

        <div id="listaPrincipal"></div>

        <div id="areaAdmin" class="hidden">
            <div class="admin-panel">
                <h3 style="margin-top:0;">Relatórios Administrativos</h3>
                <div id="estatisticasGerais" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:25px;">
                    <div style="background:#f0f9ff; padding:15px; border-radius:15px; text-align:center;">
                        <span style="font-size:0.7rem; font-weight:800; color:#0369a1;">TOTAL GERAL</span>
                        <div id="totalCost" style="font-size:1.3rem; font-weight:900; color:#0369a1;">R$ 0,00</div>
                    </div>
                </div>
                <div class="chart-container"><canvas id="chartMensal"></canvas></div>
                <div class="chart-container"><canvas id="chartCategoria"></canvas></div>
                <div style="display:flex; gap:12px;">
                    <button onclick="exportarBackup()" style="flex:1; padding:15px; border-radius:12px; border:1px solid #ddd; background:white; font-weight:700;">📥 Backup</button>
                    <label style="flex:1; padding:15px; border-radius:12px; border:1px solid #ddd; background:white; font-weight:700; text-align:center;">📤 Restaurar<input type="file" id="fileRestore" hidden onchange="importarBackup(event)"></label>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // =======================================================
    // INTEGRAÇÃO FIREBASE E LÓGICA DO SISTEMA
    // =======================================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, onAuthStateChanged, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBG9XmFduYzpXhYcWF9UPSbGa-w2GZ3cKc", 
        authDomain: "gestao-familiar-ac7d6.firebaseapp.com", 
        projectId: "gestao-familiar-ac7d6", 
        storageBucket: "gestao-familiar-ac7d6.firebasestorage.app", 
        messagingSenderId: "1063581141078", 
        appId: "1:1063581141078:web:af2fc67412dbc6fee313f7" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let tarefasGlobais = [], balancosPermanentes = [], abaAtiva = "planejamento", idEdicao = null;
    let chartM = null, chartC = null;
    
    const coresBlink = { 
        GERAL: '#f1f5f9', ALIMENTAÇÃO: '#ffedd5', MERCADO: '#dcfce7', CARTÃO: '#fae8ff', 
        CARRO: '#fee2e2', IGREJA: '#fef3c7', EDUCAÇÃO: '#fae8ff', FAXINA: '#f8fafc', 
        PET: '#ffedd5', SAÚDE: '#fee2e2', CONTAS: '#d1fae5', LAZER: '#fde68a' 
    };

    // INICIALIZAÇÃO DE DATA
    const configurarDatas = () => {
        const agora = new Date();
        const anoAt = agora.getFullYear();
        const selAno = document.getElementById('filtroAnoFatura');
        const selMes = document.getElementById('filtroMesFatura');
        
        if(selAno) {
            selAno.innerHTML = "";
            for(let i = 2025; i <= anoAt + 5; i++) {
                const opt = document.createElement('option');
                opt.value = i; opt.innerText = i;
                if(i === anoAt) opt.selected = true;
                selAno.appendChild(opt);
            }
        }
        
        if(selMes) {
            selMes.innerHTML = "";
            const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
            meses.forEach((m, i) => {
                const opt = document.createElement('option');
                opt.value = String(i+1).padStart(2, '0');
                opt.innerText = m;
                if(i === agora.getMonth()) opt.selected = true;
                selMes.appendChild(opt);
            });
        }
    };

    window.mascaraDinheiro = (i) => {
        let v = i.value.replace(/\D/g, "");
        v = (v / 100).toFixed(2).replace(".", ",");
        v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
        i.value = "R$ " + v;
    };

    const resetarCampos = () => {
        const agora = new Date();
        document.getElementById('inputData').value = agora.toLocaleDateString('sv-SE');
        document.getElementById('inputHora').value = String(agora.getHours()).padStart(2, '0') + ":" + String(agora.getMinutes()).padStart(2, '0');
        document.getElementById('inputTarefa').value = "";
        document.getElementById('inputSubItens').value = "";
        document.getElementById('inputCusto').value = "";
        document.getElementById('inputParcelas').value = "";
    };

    onAuthStateChanged(auth, user => {
        if (user) {
            configurarDatas();
            document.getElementById('telaLogin').classList.add('hidden');
            document.getElementById('telaApp').classList.remove('hidden');
            document.getElementById('appHeader').classList.remove('hidden');
            resetarCampos();
            onSnapshot(query(collection(db, "tarefas"), orderBy("criadoEm", "desc")), snap => {
                tarefasGlobais = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderizar();
            });
        }
    });

    // MONITOR DE MERCADORIAS
    const atualizarAvisoMercadoria = () => {
        const btn = document.getElementById('avisoMercadoria');
        if(!btn) return;
        const abertas = tarefasGlobais.filter(t => !t.concluida && /\(([^)]+)\)/.test(t.descricao) && !/\d+\/\d+/.test(t.descricao.match(/\(([^)]+)\)/)[1]));
        if(abertas.length > 0 && abaAtiva === 'planejamento') {
            btn.classList.remove('hidden');
            btn.innerText = `🛒 ${abertas.length} ${abertas.length > 1 ? 'listas ativas' : 'lista ativa'}! Ver Mercadorias`;
        } else { btn.classList.add('hidden'); }
    };

    // RENDERIZAÇÃO PRINCIPAL
    window.renderizar = () => {
        const lista = document.getElementById('listaPrincipal');
        const areaForm = document.getElementById('areaForm');
        const areaFaturas = document.getElementById('areaFaturas');
        const areaAdmin = document.getElementById('areaAdmin');
        
        lista.innerHTML = "";
        [areaForm, areaFaturas, areaAdmin].forEach(a => a.classList.add('hidden'));
        
        if (abaAtiva === 'planejamento') { areaForm.classList.remove('hidden'); atualizarAvisoMercadoria(); }
        else if (abaAtiva === 'faturas') areaFaturas.classList.remove('hidden');
        else if (abaAtiva === 'admin') areaAdmin.classList.remove('hidden');

        if (abaAtiva === 'itens') {
            tarefasGlobais.filter(t => !t.concluida).forEach(t => {
                const m = t.descricao.match(/\(([^)]+)\)/);
                if (m && !/^\d+\/\d+$/.test(m[1])) {
                    const h = document.createElement('div'); h.className = 'lista-header';
                    h.innerHTML = `<span>LISTA: ${t.descricao.split('(')[0]}</span>`;
                    lista.appendChild(h);
                    m[1].split(',').map(i => i.trim()).forEach((item, idx) => {
                        const div = document.createElement('div');
                        div.className = 'item-card'; div.style.borderLeft = `6px solid ${coresBlink[t.categoria]}`;
                        div.innerHTML = `<input type="checkbox" ${t.statusItens && t.statusItens[idx] ? 'checked' : ''} onchange="toggleSubItem('${t.id}',${idx},this.checked)"><span>${item}</span>`;
                        lista.appendChild(div);
                    });
                }
            });
            return;
        }

        let filtradas = [];
        if (abaAtiva === 'planejamento') filtradas = tarefasGlobais.filter(t => !t.concluida && t.categoria !== 'CARTÃO' && (t.recorrencia === "NENHUMA" || !t.recorrencia));
        else if (abaAtiva === 'faturas') {
            const m = document.getElementById('filtroMesFatura').value, a = document.getElementById('filtroAnoFatura').value;
            filtradas = tarefasGlobais.filter(t => !t.concluida && t.categoria === 'CARTÃO' && t.dataLimite.startsWith(`${a}-${m}`));
            document.getElementById('valorTotalFatura').innerText = `R$ ${filtradas.reduce((acc, t) => acc + (t.custo || 0), 0).toFixed(2)}`;
        }
        else if (abaAtiva === 'tarefas') filtradas = tarefasGlobais.filter(t => !t.concluida && t.categoria !== 'CARTÃO' && t.recorrencia !== "NENHUMA" && !t.custo);
        else if (abaAtiva === 'cronograma') filtradas = tarefasGlobais.filter(t => !t.concluida && t.categoria !== 'CARTÃO' && t.recorrencia !== "NENHUMA" && t.custo > 0);

        filtradas.sort((a,b) => a.dataLimite.localeCompare(b.dataLimite)).forEach(t => {
            const div = document.createElement('div'); div.className = 'tarefa-card'; div.style.borderLeftColor = coresBlink[t.categoria];
            div.innerHTML = `
                <div class="check-area ${t.concluida?'done':''}" onclick="toggleCheck('${t.id}', ${t.concluida})">${t.concluida?'✓':''}</div>
                <div class="info-area">
                    <span class="cat-badge">${t.categoria}</span>
                    <span class="task-name">${t.descricao.split('(')[0]}</span>
                    <span class="task-meta">📅 ${t.dataLimite.split('-').reverse().join('/')}</span>
                    ${t.custo > 0 ? `<span class="task-cost">R$ ${t.custo.toFixed(2)}</span>` : ''}
                </div>
                <div class="action-btns">
                    <button style="border:none; background:none; cursor:pointer; font-size:1.2rem;" onclick="prepararEdicao('${t.id}')">✏️</button>
                    <button style="border:none; background:none; cursor:pointer; font-size:1.2rem;" onclick="exterminar('${t.id}')">🗑️</button>
                </div>`;
            lista.appendChild(div);
        });
    };

    // SALVAMENTO COM LÓGICA DE SALTO CORRIGIDA
    window.btnSalvarClick = async () => {
        const desc = document.getElementById('inputTarefa').value.trim();
        const sub = document.getElementById('inputSubItens').value.trim();
        let custoStr = document.getElementById('inputCusto').value.replace("R$ ", "").replace(/\./g, "").replace(",", ".");
        const val = parseFloat(custoStr) || 0, data = document.getElementById('inputData').value, hora = document.getElementById('inputHora').value;
        const cat = document.getElementById('selectCategoria').value, rec = document.getElementById('selectRecorrencia').value, parc = parseInt(document.getElementById('inputParcelas').value) || 1;

        if (!desc && !sub) return alert("Preencha algo!");
        let nomeFinal = (desc || cat) + (sub !== "" ? ` (${sub})` : "");
        const valParc = val / parc;

        if (idEdicao) {
            await updateDoc(doc(db, "tarefas", idEdicao), { descricao: nomeFinal, custo: val, dataLimite: data, hora, categoria: cat, recorrencia: rec });
            idEdicao = null; document.getElementById('btnSalvar').innerText = "Salvar no Sistema";
            if (cat === "CARTÃO") mudarAba('faturas');
            else if (rec !== "NENHUMA" && val > 0) mudarAba('cronograma');
            else if (rec !== "NENHUMA" && val === 0) mudarAba('tarefas');
        } else {
            for (let i = 0; i < parc; i++) {
                let dP = new Date(data + 'T12:00:00'); dP.setMonth(dP.getMonth() + i);
                await addDoc(collection(db, "tarefas"), {
                    descricao: parc > 1 ? `${nomeFinal} (${i+1}/${parc})` : nomeFinal,
                    custo: valParc, dataLimite: dP.toISOString().split('T')[0], hora, categoria: cat, recorrencia: parc > 1 ? "MENSAL" : rec, concluida: false, criadoEm: new Date()
                });
            }
            if (cat === "CARTÃO") mudarAba('faturas');
            else if (rec !== "NENHUMA" && val > 0) mudarAba('cronograma');
            else if (rec !== "NENHUMA" && val === 0) mudarAba('tarefas');
        }
        resetarCampos();
    };
    document.getElementById('btnSalvar').onclick = window.btnSalvarClick;

    window.mudarAba = (aba) => {
        abaAtiva = aba; document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        const id = {planejamento:'btnPlan',tarefas:'btnT',cronograma:'btnC',faturas:'btnF',itens:'btnI',historico:'btnH',admin:'btnA'}[aba];
        document.getElementById(id).classList.add('active'); renderizar();
    };

    window.toggleCheck = async (id, st) => {
        const t = tarefasGlobais.find(x => x.id === id);
        if (!t.recorrencia || t.recorrencia === "NENHUMA" || t.descricao.includes('/')) {
            await updateDoc(doc(db, "tarefas", id), { concluida: !st });
        } else if (!st) {
            let dS = new Date(t.dataLimite + 'T12:00:00');
            if (t.recorrencia === "DIÁRIA") dS.setDate(dS.getDate() + 1);
            else if (t.recorrencia === "SEMANAL") dS.setDate(dS.getDate() + 7);
            else if (t.recorrencia === "MENSAL") dS.setMonth(dS.getMonth() + 1);
            const p = prompt("Data da próxima?", dS.toLocaleDateString('pt-BR')).split('/');
            await addDoc(collection(db, "tarefas"), { ...t, concluida: true, criadoEm: new Date() });
            await updateDoc(doc(db, "tarefas", id), { dataLimite: `${p[2]}-${p[1]}-${p[0]}`, statusItens: {} });
        }
    };

    window.exterminar = async (id) => { if(confirm("Deletar?")) await deleteDoc(doc(db, "tarefas", id)); };
    window.toggleSubItem = async (id, idx, st) => { const t = tarefasGlobais.find(x => x.id === id); let n = t.statusItens || {}; n[idx] = st; await updateDoc(doc(db, "tarefas", id), { statusItens: n }); };
    window.fazerLogoff = () => signOut(auth).then(() => location.reload());
    document.getElementById('btnLogin').onclick = () => signInWithPopup(auth, provider);
    window.prepararEdicao = (id) => { 
        const t = tarefasGlobais.find(x => x.id === id); idEdicao = id; mudarAba('planejamento'); 
        document.getElementById('inputTarefa').value = t.descricao.split('(')[0].trim();
        const ic = document.getElementById('inputCusto'); ic.value = t.custo.toFixed(2).replace('.', ','); mascaraDinheiro(ic);
        document.getElementById('inputData').value = t.dataLimite; document.getElementById('selectCategoria').value = t.categoria; 
        document.getElementById('selectRecorrencia').value = t.recorrencia || "NENHUMA"; document.getElementById('btnSalvar').innerText = "Atualizar Registro";
    };
    window.exportarBackup = () => { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(tarefasGlobais)], {type:'application/json'})); a.download = 'backup.json'; a.click(); };
</script>
</body>
</html>
